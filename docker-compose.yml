version: '3.8'

services:
  n8n:
    image: n8nio/n8n
    container_name: openrubot-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=rubot.taila9959b.ts.net
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://rubot.taila9959b.ts.net:5678
      - GENERIC_TIMEZONE=America/Toronto
      - TZ=America/Toronto
      - N8N_SSL_CERT=/certs/rubot.taila9959b.ts.net.crt
      - N8N_SSL_KEY=/certs/rubot.taila9959b.ts.net.key
    volumes:
      - n8n_data:/home/node/.n8n
      - /home/rusiru/openrubot/certs:/certs:ro
      - /home/rusiru/openrubot/db:/data/db:ro

volumes:
  n8n_data:
